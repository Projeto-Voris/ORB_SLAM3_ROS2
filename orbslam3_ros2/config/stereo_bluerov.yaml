%YAML:1.0
---
#--------------------------------------------------------------------------------------------
# Camera Parameters. Adjust them!
#--------------------------------------------------------------------------------------------
File.version: "1.0"

Camera.type: "PinHole"

# --- Câmera 1 ---
Camera1.fx: 314.56726
Camera1.fy: 312.62168
Camera1.cx: 304.69721
Camera1.cy: 263.825
Camera1.k1: -0.21924125
Camera1.k2: 0.08416192
Camera1.k3: -0.015265845
Camera1.p1: -0.00064082149
Camera1.p2: 0.00056451888

# --- Câmera 2 ---
Camera2.fx: 314.23407
Camera2.fy: 312.85263
Camera2.cx: 310.22006
Camera2.cy: 262.82535
Camera2.k1: -0.21277361
Camera2.k2: 0.078636493
Camera2.k3: -0.013382773
Camera2.p1: -0.0012180353
Camera2.p2: -0.00022523374

Camera.width: 612
Camera.height: 512

Camera.fps: 30

# Color order of the images (0: BGR, 1: RGB. It is ignored if images are grayscale)
Camera.RGB: 0

Stereo.ThDepth: 60.0

# Transformation matrix from right camera to left camera
Stereo.T_c1_c2: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [0.999992313735, 0.00262675869529, -0.00291077479968, -0.214986119164, 
         -0.00261144224198, 0.999982791187, 0.00525335115088, 0.00072324448685, 
         0.00292452399452, -0.00524570945196, 0.999981964683, -0.00211062436419, 
         0.0, 0.0, 0.0, 1.0]


# Transformation from body-frame (imu) to left camera
# IMU.T_b_c1: !!opencv-matrix
#   rows: 4
#   cols: 4
#   dt: f
#   data: [0.01404455,  0.01139586,  0.99983643,  0.11460563,
#         -0.99974561, -0.01748867,  0.01424261,  0.11436751,
#         0.01764812, -0.99978212,  0.01114734, -0.22278693,
#           0.,          0.,          0.,          1.,      ]


# # IMU noise
# IMU.NoiseGyro: 8.437606694181497e-05  # 0.000005148030141 # rad/s^0.5 
# IMU.NoiseAcc: 0.0008621824075684253  # 0.000066952452471 # m/s^1.5
# IMU.GyroWalk: 0.000000499999999 # rad/s^1.5
# IMU.AccWalk: 2.0569571591853487e-06  # m/s^2.5
# IMU.Frequency: 100

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------

# ORB Extractor: Number of features per image
ORBextractor.nFeatures: 1200

# ORB Extractor: Scale factor between levels in the scale pyramid
ORBextractor.scaleFactor: 1.2

# ORB Extractor: Number of levels in the scale pyramid
ORBextractor.nLevels: 8

# ORB Extractor: Fast threshold
# Image is divided in a grid. At each cell FAST are extracted imposing a minimum response.
# Firstly we impose iniThFAST. If no corners are detected we impose a lower value minThFAST
# You can lower these values if your images have low contrast
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
Viewer.imageViewScale: 1.0