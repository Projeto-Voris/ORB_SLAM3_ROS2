%YAML:1.0

#--------------------------------------------------------------------------------------------
# System config
#--------------------------------------------------------------------------------------------

# Scale Factor Used during export: 0.50
# Original Resolution: 1600x1200 -> New Resolution: 800x600

#--------------------------------------------------------------------------------------------
# Camera Parameters. Adjust them!
#--------------------------------------------------------------------------------------------
File.version: "1.0"

Camera.type: "PinHole"

# --- Câmera 1 (Esquerda) ---
# Erro RMS da calibração original: 0.4855
Camera1.fx: 397.6095
Camera1.fy: 395.34119
Camera1.cx: 393.18256
Camera1.cy: 303.2693
# Distortion (Unchanged by scale)
Camera1.k1: -0.081251969
Camera1.k2: 0.10607626
Camera1.k3: -0.056897261
Camera1.p1: -0.00033377796
Camera1.p2: 0.003606691

# --- Câmera 2 (Direita) ---
# Erro RMS da calibração original: 0.6680
Camera2.fx: 395.1768
Camera2.fy: 392.4116
Camera2.cx: 396.70816
Camera2.cy: 307.54315
# Distortion (Unchanged by scale)
Camera2.k1: -0.079033188
Camera2.k2: 0.096698127
Camera2.k3: -0.04609098
Camera2.p1: 0.0019871493
Camera2.p2: 0.0030041755

Camera.width: 800
Camera.height: 600

Camera.fps: 60
Camera.RGB: 0

Stereo.ThDepth: 60.0

Stereo.T_c1_c2: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [
      0.9999, -0.0049, -0.0134, -0.2150,
      0.0049, 1.0000, 0.0008, 0.0003,
      0.0134, -0.0008, 0.9999, -0.0044,
      0.0, 0.0, 0.0, 1.0]

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------

ORBextractor.nFeatures: 1500
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------

Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
Viewer.imageViewScale: 1.0